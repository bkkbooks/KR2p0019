body:
  text: 魯穆公問於子思曰何如而可謂忠臣子思曰恆稱其君之惡者可謂忠臣矣公不悅揖而退之成孫弋見公曰嚮者吾問忠臣於子思子思曰恆稱其君之惡者可謂忠臣矣寡人惑焉而未之得也成孫弋曰噫善哉言乎夫為其君之故殺其身者嘗有之矣恆稱其君之惡者未之有也夫為其君之故殺其身者效祿爵者也恆稱其君之惡者遠祿爵者也為義而遠祿爵非子思吾惡聞之矣
  hash: sha256:eeee3832c65a969d9a6b5f5e846ea2f05e365622b8e8d5ddbae126691de3d524
